<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu Carro</title>
</head>
<body>
    <div class="container">
      <header class="cabecalho">
        <h3>Cadastre seu veiculo para vender mais rapido</h3>
      </header>
      <div class="form-container">
        <div class="form-header">
            <p>Formulario</p>
        </div>
        <div class="form-boby">
            <h1 class="form-titulo">Venda fácil seu Carro</h1>
            <p>Descreva as caracteristicas do seu carro e marque os opicionais que ele possui</p>
            <form>


                <div class="caixainputs">
                    <label for="title">titulo do anúncio<sapan class="canpo-obrigatorio">*</sapan></label>
                    <input type="text" name="title" id="title" class="block" placeholder="digite um titulo" minlength="1" maxlength="30" required>
                </div>


                 <div class="caixainputs">
                    <label for="preco"><sapan class="canpo-obrigatorio">*</sapan></label>
                    <input type="number" name="preco" id="preço" class="block" placeholder="digite um preço" required>
                </div>

                <div class="caixainputs">
                    <label for="descricao">deacroção</label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="faça a descrição do seu veiculo aqui"></textarea>
                </div>
            </form>
        </div>
      </div>
    </div>
 
</body>
</html>
